name: Deploy InvBot v2

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on tags like v1.0.0, v1.0.1, v2.0.0, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: Deployd_invbot

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git operations

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Install dependencies
        run: |
          npm install
          cd frontend
          npm install
          cd ..

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd frontend
          npm run build
          cd ..

      - name: Run tests (optional)
        run: |
          npm test --passWithNoTests 2>/dev/null || true
          cd frontend
          npm test --passWithNoTests 2>/dev/null || true
          cd ..
        continue-on-error: true

      - name: Deploy to production server
        env:
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.DEPLOY_SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ vars.DEPLOY_SSH_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          GIT_REPO: https://github.com/${{ github.repository }}.git
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Use port 20002 if DEPLOY_SSH_PORT is not set
          DEPLOY_SSH_PORT_FINAL=${DEPLOY_SSH_PORT:-20002}
          
          # Create SSH connection and run all deployment steps in single session
          ssh -4 -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -i ~/.ssh/deploy_key \
            -p "$DEPLOY_SSH_PORT_FINAL" \
            $DEPLOY_SSH_USER@$DEPLOY_SSH_HOST bash << DEPLOY_SCRIPT
          
          set -e
          
          DEPLOY_PATH="$DEPLOY_PATH"
          BRANCH="$DEPLOY_BRANCH"
          GIT_REPO="$GIT_REPO"
          
          echo "🚀 Starting deployment to production..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: $BRANCH"
          echo "Deploy path: $DEPLOY_PATH"
          echo "Repository: $GIT_REPO"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Step 1: Initialize or update repository
          if [ ! -d "$DEPLOY_PATH" ]; then
            echo "📁 Creating deployment directory..."
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git clone "$GIT_REPO" .
          else
            cd "$DEPLOY_PATH"
          fi
          
          echo ""
          echo "Step 1: Updating repository..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          git fetch --all --tags
          git checkout $BRANCH
          git pull origin $BRANCH
          echo "✅ Repository updated"
          
          # Step 2: Install backend dependencies
          echo ""
          echo "Step 2: Installing backend dependencies..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm ci
          echo "✅ Backend dependencies installed"
          
          # Step 3: Build backend
          echo ""
          echo "Step 3: Building backend..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm run build
          echo "✅ Backend built successfully"
          
          # Step 4: Install and build frontend
          echo ""
          echo "Step 4: Installing and building frontend..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cd frontend
          npm ci
          npm run build
          cd ..
          echo "✅ Frontend built successfully"
          
          # Step 5: Run database migrations (if applicable)
          if [ -d "migrations" ]; then
            echo ""
            echo "Step 5: Running database migrations..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            npm run migrations 2>/dev/null || echo "⚠ No migrations to run"
          fi
          
          # Step 6: Restart InvBot service
          echo ""
          echo "Step 6: Restarting InvBot service..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          sudo systemctl restart invbot
          echo "✅ Service restarted"
          
          # Step 7: Verify service status
          echo ""
          echo "Step 7: Verifying service status..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          sleep 2
          sudo systemctl status invbot --no-pager
          echo "✅ Service is running"
          
          # Step 8: Health check
          echo ""
          echo "Step 8: Running health check..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if curl -s -m 10 http://localhost:3000/health | grep -q "ok"; then
            echo "✅ Health check passed"
          else
            echo "⚠ Health check pending (service may still be starting up)"
          fi
          
          # Final summary
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: $BRANCH"
          echo "Deploy path: $DEPLOY_PATH"
          echo "Timestamp: $(date)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          DEPLOY_SCRIPT

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Server: ${{ secrets.DEPLOY_SSH_HOST }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above."
          exit 1
